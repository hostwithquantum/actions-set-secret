version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    action-deps:
      patterns:
        - "*"
- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    eslint:
      patterns:
        - "eslint"
        - "eslint-*"
        - "@eslint/*"
        - "@stylistic/*"
    npm:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"
